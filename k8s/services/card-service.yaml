apiVersion: apps/v1
kind: Deployment
metadata:
  name: card-service
  namespace: exbanka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: card-service
  template:
    metadata:
      labels:
        app: card-service
    spec:
      containers:
        - name: card-service
          image: ghcr.io/raf-si-2025/exbanka-4-backend/card-service:latest
          imagePullPolicy: Always
          env:
            - name: CARD_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: card-db-url
            - name: ACCOUNT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: account-db-url
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 50059
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: card-service
  namespace: exbanka
spec:
  selector:
    app: card-service
  ports:
    - port: 50059
      targetPort: 50059
