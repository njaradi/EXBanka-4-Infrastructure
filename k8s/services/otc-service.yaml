apiVersion: apps/v1
kind: Deployment
metadata:
  name: otc-service
  namespace: exbanka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otc-service
  template:
    metadata:
      labels:
        app: otc-service
    spec:
      containers:
        - name: otc-service
          image: ghcr.io/raf-si-2025/exbanka-4-backend/otc-service:latest
          imagePullPolicy: Always
          env:
            - name: OTC_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: otc-db-url
            - name: EMPLOYEE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: employee-db-url
            - name: CLIENT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: client-db-url
            - name: ACCOUNT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: account-db-url
            - name: PORTFOLIO_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: portfolio-db-url
            - name: SECURITIES_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: securities-db-url
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 50063
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: otc-service
  namespace: exbanka
spec:
  selector:
    app: otc-service
  ports:
    - port: 50063
      targetPort: 50063
