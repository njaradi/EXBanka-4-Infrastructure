apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: exbanka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: ghcr.io/raf-si-2025/exbanka-4-backend/payment-service:latest
          imagePullPolicy: Always
          env:
            - name: PAYMENT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: payment-db-url
            - name: ACCOUNT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: account-db-url
            - name: EXCHANGE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: exchange-db-url
            - name: CLIENT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: client-db-url
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 50055
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: exbanka
spec:
  selector:
    app: payment-service
  ports:
    - port: 50055
      targetPort: 50055
