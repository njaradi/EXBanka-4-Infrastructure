apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-service
  namespace: exbanka-4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: employee-service
  template:
    metadata:
      labels:
        app: employee-service
    spec:
      containers:
        - name: employee-service
          image: ghcr.io/raf-si-2025/exbanka-4-backend/employee-service:latest
          imagePullPolicy: Always
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: exbanka-db-pguser-employee-user
                  key: uri
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: employee-service
  namespace: exbanka-4
spec:
  selector:
    app: employee-service
  ports:
    - port: 50051
      targetPort: 50051
