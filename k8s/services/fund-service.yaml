apiVersion: apps/v1
kind: Deployment
metadata:
  name: fund-service
  namespace: exbanka-4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fund-service
  template:
    metadata:
      labels:
        app: fund-service
    spec:
      containers:
        - name: fund-service
          image: ghcr.io/raf-si-2025/exbanka-4-backend/fund-service:latest
          imagePullPolicy: Always
          env:
            - name: FUND_DB_URL
              valueFrom:
                secretKeyRef:
                  name: exbanka-db-pguser-fund-user
                  key: uri
            - name: ACCOUNT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: exbanka-db-pguser-account-user
                  key: uri
            - name: EMPLOYEE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: exbanka-db-pguser-employee-user
                  key: uri
            - name: EXCHANGE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: exbanka-db-pguser-exchange-user
                  key: uri
            - name: ACCOUNT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: ACCOUNT_SERVICE_ADDR
            - name: EXCHANGE_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: EXCHANGE_SERVICE_ADDR
            - name: ORDER_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: ORDER_SERVICE_ADDR
            - name: SECURITIES_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: SECURITIES_SERVICE_ADDR
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 50064
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fund-service
  namespace: exbanka-4
spec:
  selector:
    app: fund-service
  ports:
    - port: 50064
      targetPort: 50064
