apiVersion: apps/v1
kind: Deployment
metadata:
  name: fund-service
  namespace: exbanka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fund-service
  template:
    metadata:
      labels:
        app: fund-service
    spec:
      containers:
        - name: fund-service
          image: ghcr.io/raf-si-2025/exbanka-4-backend/fund-service:latest
          imagePullPolicy: Always
          env:
            - name: FUND_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: fund-db-url
            - name: ACCOUNT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: account-db-url
            - name: EMPLOYEE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: employee-db-url
            - name: ACCOUNT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: ACCOUNT_SERVICE_ADDR
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 50064
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fund-service
  namespace: exbanka
spec:
  selector:
    app: fund-service
  ports:
    - port: 50064
      targetPort: 50064
