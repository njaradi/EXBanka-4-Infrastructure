apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-service
  namespace: exbanka-4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loan-service
  template:
    metadata:
      labels:
        app: loan-service
    spec:
      containers:
        - name: loan-service
          image: ghcr.io/raf-si-2025/exbanka-4-backend/loan-service:latest
          imagePullPolicy: Always
          env:
            - name: LOAN_DB_URL
              valueFrom:
                secretKeyRef:
                  name: exbanka-db-pguser-loan-user
                  key: uri
            - name: ACCOUNT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: exbanka-db-pguser-account-user
                  key: uri
            - name: EXCHANGE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: exbanka-db-pguser-exchange-user
                  key: uri
            - name: EMAIL_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: EMAIL_SERVICE_ADDR
            - name: CLIENT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: CLIENT_SERVICE_ADDR
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 50058
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: loan-service
  namespace: exbanka-4
spec:
  selector:
    app: loan-service
  ports:
    - port: 50058
      targetPort: 50058
