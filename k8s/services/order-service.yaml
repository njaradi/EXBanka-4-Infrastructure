apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: exbanka-4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ghcr.io/raf-si-2025/exbanka-4-backend/order-service:latest
          imagePullPolicy: Always
          env:
            - name: ORDER_DB_URL
              valueFrom:
                secretKeyRef:
                  name: exbanka-db-pguser-order-user
                  key: uri
            - name: ACCOUNT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: exbanka-db-pguser-account-user
                  key: uri
            - name: SECURITIES_DB_URL
              valueFrom:
                secretKeyRef:
                  name: exbanka-db-pguser-securities-user
                  key: uri
            - name: EXCHANGE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: exbanka-db-pguser-exchange-user
                  key: uri
            - name: EMPLOYEE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: exbanka-db-pguser-employee-user
                  key: uri
            - name: SECURITIES_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: SECURITIES_SERVICE_ADDR
            - name: LOAN_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: LOAN_SERVICE_ADDR
            - name: EMPLOYEE_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: EMPLOYEE_SERVICE_ADDR
            - name: EXCHANGE_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: EXCHANGE_SERVICE_ADDR
            - name: PORTFOLIO_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: PORTFOLIO_SERVICE_ADDR
            - name: FUND_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: FUND_SERVICE_ADDR
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 50061
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: exbanka-4
spec:
  selector:
    app: order-service
  ports:
    - port: 50061
      targetPort: 50061
