apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: exbanka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/raf-si-2025/exbanka-4-backend/auth-service:latest
          imagePullPolicy: Always
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: auth-db-url
            - name: CLIENT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: CLIENT_SERVICE_ADDR
            - name: EMPLOYEE_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: EMPLOYEE_SERVICE_ADDR
            - name: EMAIL_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: EMAIL_SERVICE_ADDR
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 50052
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: exbanka
spec:
  selector:
    app: auth-service
  ports:
    - port: 50052
      targetPort: 50052
