apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: exbanka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/raf-si-2025/exbanka-4-backend/api-gateway:latest
          imagePullPolicy: Always
          env:
            - name: EMPLOYEE_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: EMPLOYEE_SERVICE_ADDR
            - name: AUTH_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: AUTH_SERVICE_ADDR
            - name: EMAIL_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: EMAIL_SERVICE_ADDR
            - name: ACCOUNT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: ACCOUNT_SERVICE_ADDR
            - name: PAYMENT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: PAYMENT_SERVICE_ADDR
            - name: CLIENT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: CLIENT_SERVICE_ADDR
            - name: EXCHANGE_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: EXCHANGE_SERVICE_ADDR
            - name: LOAN_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: LOAN_SERVICE_ADDR
            - name: CARD_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: CARD_SERVICE_ADDR
            - name: SECURITIES_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: SECURITIES_SERVICE_ADDR
            - name: ORDER_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: ORDER_SERVICE_ADDR
            - name: PORTFOLIO_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: PORTFOLIO_SERVICE_ADDR
            - name: OTC_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: OTC_SERVICE_ADDR
            - name: FUND_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: FUND_SERVICE_ADDR
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: FRONTEND_URL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: exbanka
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8083
      targetPort: 8083
