apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-service
  namespace: exbanka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-service
  template:
    metadata:
      labels:
        app: portfolio-service
    spec:
      containers:
        - name: portfolio-service
          image: ghcr.io/raf-si-2025/exbanka-4-backend/portfolio-service:latest
          imagePullPolicy: Always
          env:
            - name: PORTFOLIO_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: portfolio-db-url
            - name: ACCOUNT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: account-db-url
            - name: EXCHANGE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: exchange-db-url
            - name: SECURITIES_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: securities-db-url
            - name: SECURITIES_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: SECURITIES_SERVICE_ADDR
            - name: EXCHANGE_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: EXCHANGE_SERVICE_ADDR
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 50062
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-service
  namespace: exbanka
spec:
  selector:
    app: portfolio-service
  ports:
    - port: 50062
      targetPort: 50062
