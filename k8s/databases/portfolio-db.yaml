apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-db-init
  namespace: exbanka
data:
  schema.sql: |
    CREATE TABLE portfolio_entry (
        id            BIGSERIAL     PRIMARY KEY,
        user_id       BIGINT        NOT NULL,
        user_type     VARCHAR(10)   NOT NULL DEFAULT 'CLIENT',
        listing_id    BIGINT        NOT NULL,
        amount        INT           NOT NULL DEFAULT 0,
        buy_price     NUMERIC(20,6) NOT NULL DEFAULT 0,
        last_modified TIMESTAMP     NOT NULL DEFAULT NOW(),
        is_public     BOOLEAN       NOT NULL DEFAULT FALSE,
        public_amount INT           NOT NULL DEFAULT 0,
        account_id    BIGINT        NOT NULL,
        UNIQUE(user_id, user_type, listing_id)
    );

    CREATE TABLE tax_record (
        id         BIGSERIAL     PRIMARY KEY,
        user_id    BIGINT        NOT NULL,
        user_type  VARCHAR(10)   NOT NULL DEFAULT 'CLIENT',
        amount_rsd NUMERIC(20,6) NOT NULL,
        month      INT           NOT NULL,
        year       INT           NOT NULL,
        is_paid    BOOLEAN       NOT NULL DEFAULT FALSE,
        paid_at    TIMESTAMP
    );
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: portfolio-db
  namespace: exbanka
spec:
  selector:
    matchLabels:
      app: portfolio-db
  serviceName: portfolio-db
  replicas: 1
  template:
    metadata:
      labels:
        app: portfolio-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: portfolio-db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: portfolio-db-password
            - name: POSTGRES_DB
              value: portfolio_db
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "portfolio_user", "-d", "portfolio_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-script
          configMap:
            name: portfolio-db-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-db
  namespace: exbanka
spec:
  selector:
    app: portfolio-db
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
