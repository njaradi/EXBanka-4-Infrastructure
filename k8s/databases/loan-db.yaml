apiVersion: v1
kind: ConfigMap
metadata:
  name: loan-db-init
  namespace: exbanka
data:
  schema.sql: |
    CREATE TABLE IF NOT EXISTS loans (
        id                      BIGSERIAL PRIMARY KEY,
        loan_number             BIGINT      NOT NULL UNIQUE,
        account_number          VARCHAR     NOT NULL,
        client_id               BIGINT      NOT NULL,
        loan_type               VARCHAR     NOT NULL,
        interest_rate_type      VARCHAR     NOT NULL,
        amount                  NUMERIC(20, 2) NOT NULL,
        currency                VARCHAR     NOT NULL,
        repayment_period        INT         NOT NULL,
        nominal_rate            NUMERIC(10, 4) NOT NULL,
        effective_rate          NUMERIC(10, 4) NOT NULL,
        agreed_date             DATE        NOT NULL DEFAULT CURRENT_DATE,
        maturity_date           DATE        NOT NULL,
        next_installment_amount NUMERIC(20, 2),
        next_installment_date   DATE,
        remaining_debt          NUMERIC(20, 2),
        status                  VARCHAR     NOT NULL DEFAULT 'PENDING',
        purpose                 VARCHAR,
        monthly_salary          NUMERIC(20, 2),
        employment_status       VARCHAR,
        employment_period       INT,
        contact_phone           VARCHAR
    );

    CREATE TABLE IF NOT EXISTS loan_installments (
        id                  BIGSERIAL PRIMARY KEY,
        loan_id             BIGINT      NOT NULL REFERENCES loans(id),
        installment_amount  NUMERIC(20, 2) NOT NULL,
        interest_rate       NUMERIC(10, 4) NOT NULL,
        currency            VARCHAR     NOT NULL,
        expected_due_date   DATE        NOT NULL,
        actual_due_date     DATE,
        status              VARCHAR     NOT NULL DEFAULT 'UNPAID',
        retry_count         INT         NOT NULL DEFAULT 0,
        last_retry_at       TIMESTAMPTZ
    );
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loan-db
  namespace: exbanka
spec:
  selector:
    matchLabels:
      app: loan-db
  serviceName: loan-db
  replicas: 1
  template:
    metadata:
      labels:
        app: loan-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: loan-db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: loan-db-password
            - name: POSTGRES_DB
              value: loan_db
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "loan_user", "-d", "loan_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-script
          configMap:
            name: loan-db-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: loan-db
  namespace: exbanka
spec:
  selector:
    app: loan-db
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
