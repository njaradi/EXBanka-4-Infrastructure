apiVersion: v1
kind: ConfigMap
metadata:
  name: order-db-init
  namespace: exbanka
data:
  schema.sql: |
    CREATE TYPE order_type_enum AS ENUM ('MARKET', 'LIMIT', 'STOP', 'STOP_LIMIT');
    CREATE TYPE order_direction AS ENUM ('BUY', 'SELL');
    CREATE TYPE order_status AS ENUM ('PENDING', 'APPROVED', 'DECLINED');

    CREATE TABLE orders (
        id                 BIGSERIAL PRIMARY KEY,
        user_id            BIGINT          NOT NULL,
        user_type          VARCHAR(10)     NOT NULL DEFAULT 'CLIENT',
        asset_id           BIGINT          NOT NULL,
        order_type         order_type_enum NOT NULL,
        quantity           INT             NOT NULL,
        contract_size      INT             NOT NULL DEFAULT 1,
        price_per_unit     NUMERIC(20,6)   NOT NULL DEFAULT 0,
        limit_value        NUMERIC(20,6),
        stop_value         NUMERIC(20,6),
        direction          order_direction NOT NULL,
        status             order_status    NOT NULL DEFAULT 'PENDING',
        approved_by        BIGINT,
        is_done            BOOLEAN         NOT NULL DEFAULT FALSE,
        last_modification  TIMESTAMP       NOT NULL DEFAULT NOW(),
        remaining_portions INT             NOT NULL DEFAULT 0,
        after_hours        BOOLEAN         NOT NULL DEFAULT FALSE,
        is_aon             BOOLEAN         NOT NULL DEFAULT FALSE,
        is_margin          BOOLEAN         NOT NULL DEFAULT FALSE,
        account_id         BIGINT          NOT NULL,
        fund_id            BIGINT          NOT NULL DEFAULT 0
    );

    CREATE TABLE order_portions (
        id        BIGSERIAL PRIMARY KEY,
        order_id  BIGINT        NOT NULL REFERENCES orders(id),
        quantity  INT           NOT NULL,
        price     NUMERIC(20,6) NOT NULL,
        filled_at TIMESTAMP     NOT NULL DEFAULT NOW()
    );
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: order-db
  namespace: exbanka
spec:
  selector:
    matchLabels:
      app: order-db
  serviceName: order-db
  replicas: 1
  template:
    metadata:
      labels:
        app: order-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: order-db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: order-db-password
            - name: POSTGRES_DB
              value: order_db
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "order_user", "-d", "order_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-script
          configMap:
            name: order-db-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: order-db
  namespace: exbanka
spec:
  selector:
    app: order-db
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
