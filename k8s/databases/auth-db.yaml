apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-db-init
  namespace: exbanka
data:
  schema.sql: |
    CREATE TABLE activation_tokens (
        token       VARCHAR PRIMARY KEY,
        employee_id BIGINT      NOT NULL,
        expires_at  TIMESTAMPTZ NOT NULL
    );

    INSERT INTO activation_tokens (token, employee_id, expires_at) VALUES
      ('cypress-valid-token-s8',   100, '2099-12-31 23:59:59+00'),
      ('cypress-expired-token-s9', 101, '2020-01-01 00:00:00+00')
    ON CONFLICT (token) DO NOTHING;

    CREATE TABLE IF NOT EXISTS password_reset_tokens (
        token       VARCHAR PRIMARY KEY,
        employee_id BIGINT      NOT NULL,
        expires_at  TIMESTAMPTZ NOT NULL
    );

    CREATE TABLE IF NOT EXISTS client_activation_tokens (
        token      VARCHAR PRIMARY KEY,
        client_id  BIGINT      NOT NULL,
        expires_at TIMESTAMPTZ NOT NULL
    );

    CREATE TABLE IF NOT EXISTS two_factor_approvals (
        id          BIGSERIAL    PRIMARY KEY,
        client_id   BIGINT       NOT NULL,
        action_type VARCHAR      NOT NULL,
        payload     TEXT         NOT NULL DEFAULT '{}',
        status      VARCHAR      NOT NULL DEFAULT 'PENDING',
        created_at  TIMESTAMPTZ  NOT NULL DEFAULT now(),
        expires_at  TIMESTAMPTZ  NOT NULL DEFAULT now() + interval '5 minutes'
    );

    CREATE TABLE IF NOT EXISTS push_tokens (
        client_id   BIGINT   PRIMARY KEY,
        token       VARCHAR  NOT NULL
    );
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-db
  namespace: exbanka
spec:
  selector:
    matchLabels:
      app: auth-db
  serviceName: auth-db
  replicas: 1
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: auth-db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: auth-db-password
            - name: POSTGRES_DB
              value: auth_db
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "auth_user", "-d", "auth_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-script
          configMap:
            name: auth-db-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: exbanka
spec:
  selector:
    app: auth-db
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
