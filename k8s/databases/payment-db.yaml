apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-db-init
  namespace: exbanka
data:
  schema.sql: |
    CREATE TABLE payment_recipients (
        id             BIGSERIAL PRIMARY KEY,
        client_id      BIGINT    NOT NULL,
        name           VARCHAR   NOT NULL,
        account_number VARCHAR   NOT NULL,
        "order"        INT       NOT NULL DEFAULT 0
    );

    CREATE TABLE transfers (
        id             BIGSERIAL PRIMARY KEY,
        order_number   VARCHAR        NOT NULL UNIQUE,
        from_account   VARCHAR        NOT NULL,
        to_account     VARCHAR        NOT NULL,
        initial_amount NUMERIC(20, 2) NOT NULL,
        final_amount   NUMERIC(20, 2) NOT NULL,
        exchange_rate  NUMERIC(20, 6) NOT NULL DEFAULT 1,
        fee            NUMERIC(20, 2) NOT NULL DEFAULT 0,
        timestamp      TIMESTAMPTZ    NOT NULL DEFAULT NOW()
    );

    CREATE TABLE payments (
        id               BIGSERIAL PRIMARY KEY,
        order_number     VARCHAR     NOT NULL UNIQUE,
        from_account     VARCHAR     NOT NULL,
        to_account       VARCHAR     NOT NULL,
        initial_amount   NUMERIC(20, 2) NOT NULL,
        final_amount     NUMERIC(20, 2) NOT NULL,
        fee              NUMERIC(20, 2) NOT NULL DEFAULT 0,
        recipient_id     BIGINT REFERENCES payment_recipients(id),
        payment_code     VARCHAR,
        reference_number VARCHAR,
        purpose          VARCHAR,
        timestamp        TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        status           VARCHAR     NOT NULL DEFAULT 'PROCESSING'
    );
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: payment-db
  namespace: exbanka
spec:
  selector:
    matchLabels:
      app: payment-db
  serviceName: payment-db
  replicas: 1
  template:
    metadata:
      labels:
        app: payment-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: payment-db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: payment-db-password
            - name: POSTGRES_DB
              value: payment_db
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "payment_user", "-d", "payment_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-script
          configMap:
            name: payment-db-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-db
  namespace: exbanka
spec:
  selector:
    app: payment-db
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
