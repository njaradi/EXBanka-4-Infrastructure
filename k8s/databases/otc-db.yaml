apiVersion: v1
kind: ConfigMap
metadata:
  name: otc-db-init
  namespace: exbanka
data:
  schema.sql: |
    CREATE TABLE IF NOT EXISTS otc_negotiations (
        id               BIGSERIAL PRIMARY KEY,
        ticker           VARCHAR(20)    NOT NULL,
        seller_id        BIGINT         NOT NULL,
        seller_type      VARCHAR(10)    NOT NULL DEFAULT 'CLIENT',
        buyer_id         BIGINT         NOT NULL,
        buyer_type       VARCHAR(10)    NOT NULL DEFAULT 'CLIENT',
        amount           INT            NOT NULL,
        price_per_stock  DECIMAL(18,4)  NOT NULL,
        settlement_date  DATE           NOT NULL,
        premium          DECIMAL(18,4)  NOT NULL,
        currency         VARCHAR(10)    NOT NULL,
        last_modified    TIMESTAMP      NOT NULL DEFAULT NOW(),
        modified_by_id   BIGINT,
        modified_by_type VARCHAR(10),
        status           VARCHAR(20)    NOT NULL DEFAULT 'PENDING_SELLER'
    );

    CREATE TABLE IF NOT EXISTS otc_contracts (
        id               BIGSERIAL PRIMARY KEY,
        negotiation_id   BIGINT NOT NULL UNIQUE REFERENCES otc_negotiations(id),
        seller_id        BIGINT NOT NULL,
        seller_type      VARCHAR(10) NOT NULL,
        buyer_id         BIGINT NOT NULL,
        buyer_type       VARCHAR(10) NOT NULL,
        ticker           VARCHAR(20) NOT NULL,
        amount           INT NOT NULL,
        strike_price     DECIMAL(18,4) NOT NULL,
        premium          DECIMAL(18,4) NOT NULL,
        currency         VARCHAR(10) NOT NULL,
        settlement_date  DATE NOT NULL,
        status           VARCHAR(20) NOT NULL DEFAULT 'ACTIVE',
        created_at       TIMESTAMP NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS otc_saga_log (
        id           BIGSERIAL PRIMARY KEY,
        contract_id  BIGINT NOT NULL REFERENCES otc_contracts(id),
        step         INT NOT NULL,
        status       VARCHAR(20) NOT NULL,
        timestamp    TIMESTAMP NOT NULL DEFAULT NOW(),
        error_msg    TEXT
    );
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: otc-db
  namespace: exbanka
spec:
  selector:
    matchLabels:
      app: otc-db
  serviceName: otc-db
  replicas: 1
  template:
    metadata:
      labels:
        app: otc-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: otc-db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: otc-db-password
            - name: POSTGRES_DB
              value: otc_db
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "otc_user", "-d", "otc_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-script
          configMap:
            name: otc-db-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: otc-db
  namespace: exbanka
spec:
  selector:
    app: otc-db
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
