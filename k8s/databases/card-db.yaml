apiVersion: v1
kind: ConfigMap
metadata:
  name: card-db-init
  namespace: exbanka
data:
  schema.sql: |
    CREATE TABLE authorized_persons (
        id             BIGSERIAL PRIMARY KEY,
        first_name     VARCHAR NOT NULL,
        last_name      VARCHAR NOT NULL,
        date_of_birth  DATE    NOT NULL,
        gender         VARCHAR NOT NULL,
        email          VARCHAR NOT NULL,
        phone_number   VARCHAR NOT NULL,
        address        VARCHAR NOT NULL,
        account_number VARCHAR NOT NULL
    );

    CREATE TABLE card_requests (
        id                     BIGSERIAL    PRIMARY KEY,
        request_token          VARCHAR      NOT NULL UNIQUE,
        account_number         VARCHAR      NOT NULL,
        card_name              VARCHAR      NOT NULL,
        caller_client_id       BIGINT       NOT NULL,
        for_self               BOOLEAN      NOT NULL DEFAULT true,
        authorized_person_data JSONB,
        confirmation_code      VARCHAR      NOT NULL,
        expires_at             TIMESTAMPTZ  NOT NULL,
        used                   BOOLEAN      NOT NULL DEFAULT false
    );

    CREATE TABLE cards (
        id                   BIGSERIAL PRIMARY KEY,
        card_number          VARCHAR       NOT NULL UNIQUE,
        card_type            VARCHAR       NOT NULL DEFAULT 'DEBIT',
        card_name            VARCHAR       NOT NULL,
        created_at           TIMESTAMP     NOT NULL DEFAULT NOW(),
        expiry_date          DATE          NOT NULL,
        account_number       VARCHAR       NOT NULL,
        cvv                  VARCHAR       NOT NULL,
        card_limit           NUMERIC(20,2),
        status               VARCHAR       NOT NULL DEFAULT 'ACTIVE',
        authorized_person_id BIGINT        REFERENCES authorized_persons(id)
    );
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: card-db
  namespace: exbanka
spec:
  selector:
    matchLabels:
      app: card-db
  serviceName: card-db
  replicas: 1
  template:
    metadata:
      labels:
        app: card-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: card-db-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: card-db-password
            - name: POSTGRES_DB
              value: card_db
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "card_user", "-d", "card_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-script
          configMap:
            name: card-db-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: card-db
  namespace: exbanka
spec:
  selector:
    app: card-db
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
