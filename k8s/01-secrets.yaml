apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: exbanka
type: Opaque
stringData:
  employee-db-url: "postgres://employee_user:employee_pass@employee-db:5432/employee_db?sslmode=disable"
  auth-db-url: "postgres://auth_user:auth_pass@auth-db:5432/auth_db?sslmode=disable"
  client-db-url: "postgres://client_user:client_pass@client-db:5432/client_db?sslmode=disable"
  account-db-url: "postgres://account_user:account_pass@account-db:5432/account_db?sslmode=disable"
  payment-db-url: "postgres://payment_user:payment_pass@payment-db:5432/payment_db?sslmode=disable"
  exchange-db-url: "postgres://exchange_user:exchange_pass@exchange-db:5432/exchange_db?sslmode=disable"
  loan-db-url: "postgres://loan_user:loan_pass@loan-db:5432/loan_db?sslmode=disable"
  card-db-url: "postgres://card_user:card_pass@card-db:5432/card_db?sslmode=disable"
  securities-db-url: "postgres://securities_user:securities_pass@securities-db:5432/securities_db?sslmode=disable"
  order-db-url: "postgres://order_user:order_pass@order-db:5432/order_db?sslmode=disable"
  portfolio-db-url: "postgres://portfolio_user:portfolio_pass@portfolio-db:5432/portfolio_db?sslmode=disable"
  otc-db-url: "postgres://otc_user:otc_pass@otc-db:5432/otc_db?sslmode=disable"
  fund-db-url: "postgres://fund_user:fund_pass@fund-db:5432/fund_db?sslmode=disable"
  # Individual credentials used by StatefulSet env vars
  employee-db-user: "employee_user"
  employee-db-password: "employee_pass"
  auth-db-user: "auth_user"
  auth-db-password: "auth_pass"
  client-db-user: "client_user"
  client-db-password: "client_pass"
  account-db-user: "account_user"
  account-db-password: "account_pass"
  payment-db-user: "payment_user"
  payment-db-password: "payment_pass"
  exchange-db-user: "exchange_user"
  exchange-db-password: "exchange_pass"
  loan-db-user: "loan_user"
  loan-db-password: "loan_pass"
  card-db-user: "card_user"
  card-db-password: "card_pass"
  securities-db-user: "securities_user"
  securities-db-password: "securities_pass"
  order-db-user: "order_user"
  order-db-password: "order_pass"
  portfolio-db-user: "portfolio_user"
  portfolio-db-password: "portfolio_pass"
  otc-db-user: "otc_user"
  otc-db-password: "otc_pass"
  fund-db-user: "fund_user"
  fund-db-password: "fund_pass"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: exbanka
type: Opaque
stringData:
  JWT_SECRET: "change-me-use-a-strong-secret"
  SMTP_HOST: "change-me"
  SMTP_PORT: "587"
  SMTP_USER: "change-me"
  SMTP_PASSWORD: "change-me"
  FROM_EMAIL: "change-me@example.com"
  ALPACA_API_KEY: "change-me"
  ALPACA_API_SECRET_KEY: "change-me"
  ALPHAVANTAGE_API_KEY: "change-me"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
